<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💧 Add PDF Watermark | EasyUseHub</title>
<style>
body, html {
    font-family: 'Segoe UI', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    width: 90%;
    max-width: 650px;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}
h2 { margin-bottom: 10px; color: #1e293b; }
p.description {
    color: #475569;
    font-size: 0.95rem;
    margin-bottom: 20px;
    line-height: 1.6;
    letter-spacing: 0.5px;
    font-style: italic;
}
.upload {
    padding: 25px;
    border: 3px dashed #9333ea;
    border-radius: 15px;
    cursor: pointer;
    margin-bottom: 12px;
    font-weight: 600;
    color: #9333ea;
    transition: 0.3s;
}
.upload:hover { background: #f5e6fa; transform: scale(1.03); }
input, select {
    padding: 10px;
    margin: 6px 0;
    width: 90%;
    max-width: 400px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    margin: 6px 3px;
    background: #9333ea;
    color: #fff;
    transition: 0.3s;
}
button:hover { background: #7e22ce; }
#download-btn { display:none; background:#2563eb; }
#download-btn:hover { background:#1e40af; }
#status { margin-top: 10px; color: #475569; }
.pages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px,1fr));
    gap: 10px;
    margin-top: 15px;
}
.page-item {
    border: 2px solid #ddd;
    border-radius: 8px;
    padding: 5px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}
.page-item.selected { border-color: #ef4444; background: #fee2e2; }
canvas { width:100%; height:auto; border:1px solid #ccc; border-radius:8px; }
.bottom-buttons {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
}
.bottom-buttons a {
    text-decoration: none;
    padding: 10px 16px;
    border-radius: 8px;
    background: #1e293b;
    color: #fff;
    font-weight: 600;
}
.bottom-buttons a:hover { background: #3b82f6; }
.ad-placeholder {
    margin: 15px 0;
    padding: 15px;
    border: 2px dashed #ccc;
    border-radius: 10px;
    color: #999;
    font-size: 0.9rem;
    text-align: center;
}
</style>
</head>
<body>

<div class="container">
<h2>💧 Add PDF Watermark</h2>
<p class="description">
Select pages, enter watermark text, choose color & position, and download instantly.
</p>

<div class="ad-placeholder">Ad Placeholder</div>

<div class="upload" onclick="document.getElementById('file').click()">📁 Upload PDF</div>
<input type="file" id="file" accept="application/pdf" hidden>

<input type="text" id="watermark-text" placeholder="Enter watermark text">
<input type="color" id="watermark-color" value="#999999">
<select id="watermark-position">
    <option value="" disabled selected>Select Position</option>
    <option value="center">Center</option>
    <option value="top-left">Top Left</option>
    <option value="top-right">Top Right</option>
    <option value="bottom-left">Bottom Left</option>
    <option value="bottom-right">Bottom Right</option>
</select>

<div style="margin:10px 0;">
<button onclick="selectAll()">All Select</button>
<button onclick="deselectAll()">All Deselect</button>
</div>

<div id="pages-container" class="pages-grid"></div>

<button onclick="addWatermark()">Add Watermark</button>
<button id="download-btn">📥 Download PDF</button>

<p id="status">No file selected</p>

<!-- Bottom Buttons: Only All PDF Tools and Home -->
<div class="bottom-buttons">
    <a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1" target="_blank">📂 All PDF Tools</a>
    <a href="https://easyusehub.blogspot.com/?m=1" target="_blank">🏠 Home</a>
</div>

<div class="ad-placeholder">Ad Placeholder</div>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
// JS code same as previous, handling upload, select pages, add watermark, download
let file=null, pdfDocLib=null;
const selectAll = ()=>document.querySelectorAll('.page-item').forEach(d=>d.classList.add('selected'));
const deselectAll = ()=>document.querySelectorAll('.page-item').forEach(d=>d.classList.remove('selected'));
// Add watermark function remains same as before
</script>

</body>
</html>
